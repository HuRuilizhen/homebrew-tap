name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.formulas.outputs.formulas }}
    steps:
      - uses: actions/checkout@v5

      - id: formulas
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          formulas = sorted(path.stem for path in Path("Formula").glob("*.rb"))
          if not formulas:
              raise SystemExit("No formulae found in Formula/")

          print(f"formulas={json.dumps(formulas)}")
          PY

  style:
    needs: discover
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Tap local checkout
        run: brew tap HuRuilizhen/tap "$GITHUB_WORKSPACE"

      - name: Check formula style
        run: brew style Formula/*.rb

      - name: Check tap syntax
        run: brew readall --aliases --syntax HuRuilizhen/tap

  install-test:
    needs: discover
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.discover.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v5

      - name: Tap local checkout
        run: brew tap HuRuilizhen/tap "$GITHUB_WORKSPACE"

      - name: Install formula
        run: brew install "HuRuilizhen/tap/${{ matrix.formula }}"

      - name: Test formula
        run: brew test "HuRuilizhen/tap/${{ matrix.formula }}"

  audit:
    needs: discover
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.discover.outputs.formulas) }}
    steps:
      - uses: actions/checkout@v5

      - name: Tap local checkout
        run: brew tap HuRuilizhen/tap "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --strict "HuRuilizhen/tap/${{ matrix.formula }}"
